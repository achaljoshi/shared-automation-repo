# GitLab CI/CD Pipeline for Shared Automation Framework
# Uses shell executor with matrix-style test jobs per system

stages:
  - build
  - test
  - report

variables:
  MAVEN_OPTS: "-Dmaven.repo.local=$CI_PROJECT_DIR/.m2/repository -Xmx2048m"
  MAVEN_CLI_OPTS: "--batch-mode --errors --fail-at-end"

# Cache Maven dependencies across jobs
cache:
  key: "${CI_COMMIT_REF_SLUG}-maven"
  paths:
    - .m2/repository

# --- Hidden job template ---
.test_template: &test_template
  stage: test
  tags:
    - shell
  before_script:
    - echo "Building shared core modules..."
    - mvn $MAVEN_CLI_OPTS install -pl shared-core --also-make -DskipTests
    - echo "Shared core modules installed successfully"
  artifacts:
    when: always
    paths:
      - "**/target/cucumber-reports/"
      - "**/target/screenshots/"
    reports:
      junit:
        - "**/target/cucumber-reports/*-junit.xml"
    expire_in: 7 days
  allow_failure: false

# --- Build stage ---
build:compile:
  stage: build
  tags:
    - shell
  script:
    - echo "Compiling all modules..."
    - mvn $MAVEN_CLI_OPTS compile -DskipTests
    - echo "Compilation successful"
  artifacts:
    expire_in: 1 hour
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_BRANCH == "develop"'

# --- Test jobs ---
test:system1:
  <<: *test_template
  script:
    - echo "Running System1 (Government Portal) tests..."
    - mvn $MAVEN_CLI_OPTS test -pl team-a-system1
        -Dcucumber.filter.tags="@sys1 or @shared"
        -Dbrowser=${BROWSER:-chrome}
        -Dheadless=${HEADLESS:-true}
    - echo "System1 tests completed"
  variables:
    SYSTEM_NAME: "System1 - Government Portal"
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_BRANCH == "develop"'
    - if: '$RUN_SYSTEM1 == "true"'

test:system2:
  <<: *test_template
  script:
    - echo "Running System2 (Financial Dashboard) tests..."
    - mvn $MAVEN_CLI_OPTS test -pl team-b-system2
        -Dcucumber.filter.tags="@sys2 or @shared"
        -Dbrowser=${BROWSER:-chrome}
        -Dheadless=${HEADLESS:-true}
    - echo "System2 tests completed"
  variables:
    SYSTEM_NAME: "System2 - Financial Dashboard"
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_BRANCH == "develop"'
    - if: '$RUN_SYSTEM2 == "true"'

# --- Report aggregation ---
report:aggregate:
  stage: report
  tags:
    - shell
  needs:
    - job: test:system1
      artifacts: true
    - job: test:system2
      artifacts: true
  script:
    - echo "Aggregating test reports..."
    - mkdir -p target/aggregated-reports
    - |
      for f in team-a-system1/target/cucumber-reports/*.json team-b-system2/target/cucumber-reports/*.json; do
        [ -f "$f" ] && cp "$f" target/aggregated-reports/ && echo "Copied $f"
      done
    - echo "Report aggregation complete. Files in target/aggregated-reports:"
    - ls -la target/aggregated-reports/ || echo "No reports found"
  artifacts:
    when: always
    paths:
      - target/aggregated-reports/
    expire_in: 30 days
  allow_failure: true
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_BRANCH == "develop"'
